<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
    <h2 class="text-2xl font-semibold text-gray-800 mb-6">Place an Order</h2>

    <!-- Customer Details -->
    <div class="mb-8">
      <h3 class="text-sm font-medium text-gray-500 uppercase tracking-wide mb-4">Customer Details</h3>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
          <input [(ngModel)]="customer.name" type="text" placeholder="John Doe"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input [(ngModel)]="customer.email" type="email" placeholder="john@example.com"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div class="col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Shipping Address</label>
          <input [(ngModel)]="customer.shippingAddress" type="text" placeholder="123 Main St, Cairo, Egypt"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
      </div>
    </div>

    <!-- Order Items -->
    <div class="mb-8">
      <h3 class="text-sm font-medium text-gray-500 uppercase tracking-wide mb-4">Order Items</h3>
      <div class="space-y-4">
        @for (item of items; track item.id; let i = $index) {
          <div class="border border-gray-200 rounded-lg p-4">
            <div class="grid grid-cols-3 gap-3">
              <div class="col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
                <input [(ngModel)]="item.product.name" type="text" placeholder="Product name"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
                <input [(ngModel)]="item.quantity" type="number" min="1"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Price ($)</label>
                <input [(ngModel)]="item.product.price" type="number" min="0" step="0.01"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
              </div>
              <div class="col-span-2 flex items-end justify-end">
                @if (items.length > 1) {
                  <button (click)="removeItem(i)"
                          class="text-sm text-red-500 hover:text-red-700 font-medium">
                    Remove
                  </button>
                }
              </div>
            </div>
          </div>
        }
      </div>
      <button (click)="addItem()"
              class="mt-3 text-sm text-blue-600 hover:text-blue-800 font-medium">
        + Add Item
      </button>
    </div>

    <!-- Total & Submit -->
    <div class="flex items-center justify-between pt-4 border-t border-gray-200">
      <div>
        <span class="text-sm text-gray-500">Total</span>
        <p class="text-2xl font-semibold text-gray-800">${{ totalAmount().toFixed(2) }}</p>
      </div>
      <button (click)="placeOrder()" [disabled]="isSubmitting"
              class="bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white font-medium px-6 py-3 rounded-lg transition-colors">
        {{ isSubmitting ? 'Placing Order...' : 'Place Order' }}
      </button>
    </div>
  </div>
</div>
